name: Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag / version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate icons from MW.svg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows/MW/Assets | Out-Null
          # Convert SVG -> PNGs at multiple sizes using Inkscape (preinstalled on windows-latest via choco?).
          # Fall back to ImageMagick which is preinstalled on windows-latest runners.
          $sizes = 16,24,32,48,64,128,256
          foreach ($s in $sizes) {
            magick -background none -density 384 MW.svg -resize "${s}x${s}" "windows/MW/Assets/icon_${s}.png"
          }
          # Tray icon: small, transparent background.
          magick "windows/MW/Assets/icon_32.png" "windows/MW/Assets/tray.ico"
          # App icon: combined .ico.
          magick `
            "windows/MW/Assets/icon_16.png" `
            "windows/MW/Assets/icon_24.png" `
            "windows/MW/Assets/icon_32.png" `
            "windows/MW/Assets/icon_48.png" `
            "windows/MW/Assets/icon_64.png" `
            "windows/MW/Assets/icon_128.png" `
            "windows/MW/Assets/icon_256.png" `
            "windows/MW/Assets/app.ico"

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish windows/MW/MW.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
            -o build/win

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path build/win/* -DestinationPath build/MW-windows-x64.zip
          (Get-FileHash build/MW-windows-x64.zip -Algorithm SHA256).Hash | Out-File -Encoding ascii build/MW-windows-x64.zip.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            build/MW-windows-x64.zip
            build/MW-windows-x64.zip.sha256
