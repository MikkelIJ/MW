name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve tag / version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build app
        run: ./build.sh release

      - name: Rename bundle to MW.app
        run: |
          mv build/mikkelsworkspace.app build/MW.app
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.ver.outputs.version }}" build/MW.app/Contents/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.ver.outputs.version }}"            build/MW.app/Contents/Info.plist || true
          codesign --force --deep --sign - build/MW.app

      - name: Package zip
        run: |
          cd build
          ditto -c -k --keepParent MW.app MW.zip
          shasum -a 256 MW.zip > MW.zip.sha256

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "No CHANGELOG.md found; falling back to auto-generated notes."
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pull lines from "## <TAG>" up to (but not including) the
          # next "## " header. Tolerate trailing date suffix.
          awk -v tag="$TAG" '
            $0 ~ "^## "tag"( |$)" {flag=1; next}
            flag && /^## / {exit}
            flag {print}
          ' CHANGELOG.md > /tmp/notes.md
          if [ -s /tmp/notes.md ]; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
            echo "Extracted notes:"
            cat /tmp/notes.md
          else
            echo "No CHANGELOG entry for $TAG; falling back to auto-generated notes."
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: ${{ steps.notes.outputs.have_notes == 'true' && '/tmp/notes.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.have_notes != 'true' }}
          files: |
            build/MW.zip
            build/MW.zip.sha256

      - name: Bump Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          SHA256="$(awk '{print $1}' build/MW.zip.sha256)"
          # Replace the version + sha256 lines in the cask. Match the
          # leading two-space indent so we don't touch anything else.
          /usr/bin/sed -i '' -E \
            -e "s|^  version \".*\"|  version \"${VERSION}\"|" \
            -e "s|^  sha256 \"[a-f0-9]{64}\"|  sha256 \"${SHA256}\"|" \
            Casks/mw.rb

          # Rewrite the RELEASE_NOTES block so `brew upgrade --cask mw`
          # prints the curated changelog as caveats.
          if [ -s /tmp/notes.md ]; then
            {
              echo "  # RELEASE_NOTES_BEGIN — auto-replaced by .github/workflows/release.yml"
              echo "  caveats <<~EOS"
              echo "    What's new in v#{version}:"
              echo ""
              # Indent each non-empty changelog line by 4 spaces so it
              # nests correctly inside the heredoc. Strip blank lines
              # at the very start/end. Escape any literal heredoc
              # terminator just in case.
              awk 'NF { found=1 } found' /tmp/notes.md \
                | awk '{ lines[NR]=$0 } END { for (i=1;i<=NR;i++) if (i<NR || lines[i] != "") print lines[i] }' \
                | sed -E 's/^/    /' \
                | sed -E 's/^    EOS$/    EO_S/'
              echo ""
              echo "    Full release: https://github.com/MikkelIJ/MW/releases/tag/v#{version}"
              echo "  EOS"
              echo "  # RELEASE_NOTES_END"
            } > /tmp/release_notes_block.rb

            /usr/bin/awk '
              BEGIN { skip = 0 }
              /^  # RELEASE_NOTES_BEGIN/ {
                while ((getline line < "/tmp/release_notes_block.rb") > 0) print line
                close("/tmp/release_notes_block.rb")
                skip = 1
                next
              }
              /^  # RELEASE_NOTES_END/ { skip = 0; next }
              skip == 0 { print }
            ' Casks/mw.rb > Casks/mw.rb.new
            mv Casks/mw.rb.new Casks/mw.rb
          fi

          # Only commit if something actually changed.
          if git diff --quiet Casks/mw.rb; then
            echo "Cask already up to date."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/mw.rb
          git commit -m "Casks: bump mw to ${VERSION}"
          git push origin HEAD:main
